<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Propert </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        .container {
            background-color: transparent;
            display: flex;
            justify-content: center;
            justify-content: space-between;
            justify-content: space-evenly;
            justify-content: space-around;
            


            align-items: center;
            gap:5px;

        }

        .a {
            height: 100px;
            width: 100px;
            background: rgb(51, 128, 0);
            color: rgb(146, 32, 32);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="a"> HTML</div>
        <div class="a">CSS</div>
        <div class="a">JS</div>
        <div class="a">BOOTSsTrap</div>

    </div>
</body>

</html>
